name: build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Fetch bundled runtime (Python + sqlmap)
        run: |
          mkdir -p src/main/resources/runtime
          curl -L -o src/main/resources/runtime/python-embed.zip \
            https://www.python.org/ftp/python/3.11.9/python-3.11.9-embed-amd64.zip
          curl -L -o src/main/resources/runtime/sqlmap.zip \
            https://github.com/sqlmapproject/sqlmap/archive/refs/heads/master.zip

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build extension jar
        run: gradle jar --no-daemon

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: burp-sqlmap-jar
          path: build/libs/*.jar
